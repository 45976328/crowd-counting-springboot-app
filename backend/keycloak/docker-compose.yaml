services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:latest
    ports:
      - 8082:8080
    entrypoint: ["/opt/keycloak/bin/kc.sh", "start", "--http-enabled=true"]
    environment:
        KC_BOOTSTRAP_ADMIN_USERNAME: admin
        KC_BOOTSTRAP_ADMIN_PASSWORD: admin

        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
        KC_DB_USERNAME: root
        KC_DB_PASSWORD: root
        KC_HOSTNAME: localhost
        KC_HOSTNAME_PORT: 8080
        # KC_HTTPS_CERTIFICATE_FILE: /certs/fullchain.pem
        # KC_HTTPS_CERTIFICATE_KEY_FILE: /certs/privkey.pem
        KC_HTTP_ENABLED: "true"
        KC_HOSTNAME_STRICT: "false"
        # ADD http://keycloak:8080  (if api gateway is dockerized and on the same network) to the front end url of the realm that handles api gateway !!!!!!!!!!!!

    volumes:
      - pgkcdata:/keycloak/
    depends_on:
      - keycloak-postgres
    

  
  keycloak-postgres:
    image: postgres
    container_name: keycloak-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: keycloak
    volumes:
      - pgkcdata:/var/lib/postgresql/data


networks:
  default:
    external:
      name: microservices-net

volumes:
  pgkcdata:
    external: true
      