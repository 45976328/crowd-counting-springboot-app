
services:
  broker:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      # --- KRaft single-node basics ---
      KAFKA_NODE_ID: 1
      
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      # Bind to all interfaces INSIDE the container (no "localhost")
      KAFKA_LISTENERS: BROKER://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      # Advertise a reachable hostname for other containers
      KAFKA_ADVERTISED_LISTENERS: BROKER://broker:9092,EXTERNAL://broker:29092
      # Controller quorum points to the container hostname
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093

      # Single-node cluster defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

      # --- JMX for Kafbat metrics ---
      # Either of these patterns works with the apache/kafka image.
      JMX_PORT: 9999
      KAFKA_JMX_OPTS: >
        -Dcom.sun.management.jmxremote
        -Dcom.sun.management.jmxremote.local.only=false
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Djava.rmi.server.hostname=broker

    volumes:
      - kafkadata:/kafka/
    # No ports: section required for inter-container access;


  kafka-ui:
    image: kafbat/kafka-ui:main
    container_name: kafka-ui
    ports:
      - 8081:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      # Point to the broker listener, not the controller
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9092
      # Tell Kafbat which JMX port to scrape on each broker
      KAFKA_CLUSTERS_0_METRICS_PORT: 9999
      # Optional: turn up logs if you still see 500s
      # LOGGING_LEVEL_IO_KAFBAT_UI: debug
      # LOGGING_LEVEL_ROOT: debug
    depends_on:
      - broker



networks:
  default:
    external:
      name: microservices-net


volumes:
  kafkadata:
    external: true


