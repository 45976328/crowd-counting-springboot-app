spring.application.name=api-gateway
spring.docker.compose.enabled=false
server.port=8080
logging.level.root=INFO

## Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082/realms/api-gateway

## Discovery Server
spring.cloud.gateway.server.webflux.routes[0].id=discovery-server
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8761
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/eureka/web
## filter is ingest service post path, without it when we access ../api/v1/gateway it looks for that path in ingest service
spring.cloud.gateway.server.webflux.routes[0].filters[0]=SetPath=/

## Discovery Server Static
spring.cloud.gateway.server.webflux.routes[1].id=discovery-server-static
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8761
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/eureka/**

## Ingest Service Route
spring.cloud.gateway.server.webflux.routes[2].id=ingest-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ingest-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/gateway
## filter is ingest service post path, without it when we access ../api/v1/gateway it looks for that path in ingest service
spring.cloud.gateway.server.webflux.routes[2].filters[0]=SetPath=/ingest/publish
## Incoming: POST /api/v1/gateway
## Outgoing to backend: POST /ingest/publish




## Kafbat 

spring.cloud.gateway.server.webflux.routes[3].id=kafbat
spring.cloud.gateway.server.webflux.routes[3].uri=no://op
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/kafbat
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RedirectTo=302, http://localhost:8081


